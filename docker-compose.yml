services:
  mongo1:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1-data:/data/db

  mongo2:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo2-data:/data/db

  mongo3:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    volumes:
      - mongo3-data:/data/db

  mongo-init:
    image: mongo:7
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    restart: "no"
    entrypoint: ["bash", "/docker/init-replica.sh"]
    volumes:
      - ./docker:/docker:ro

  redis:
    image: redis:7
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data

  api:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - mongo-init
      - redis
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./:/app

volumes:
  mongo1-data:
  mongo2-data:
  mongo3-data:
  redis-data:
